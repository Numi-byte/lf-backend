# Production profile. Values without safe defaults must be supplied by the runtime
# environment or secrets manager (for example, ECS task environment/secrets).
server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

management.endpoints.web.exposure.include=health,info

# S3-compatible object storage. On AWS, use a private S3 bucket and IAM/secret-backed credentials.
s3.endpoint=${S3_ENDPOINT:https://s3.${S3_REGION:eu-central-1}.amazonaws.com}
s3.accessKey=${S3_ACCESS_KEY:}
s3.secretKey=${S3_SECRET_KEY:}
s3.bucket=${S3_BUCKET}
s3.region=${S3_REGION:eu-central-1}

spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:20MB}

rateLimit.idMatch.maxRequests=${RATE_LIMIT_ID_MATCH_MAX_REQUESTS:10}
rateLimit.idMatch.windowSeconds=${RATE_LIMIT_ID_MATCH_WINDOW_SECONDS:600}

lostfound.claims.mail.enabled=${LOSTFOUND_CLAIMS_MAIL_ENABLED:true}
lostfound.claims.mail.from=${LOSTFOUND_CLAIMS_MAIL_FROM:noreply@suedtirolmobil.info}
lostfound.claims.mail.oauth.client-id=${LOSTFOUND_CLAIMS_MAIL_OAUTH_CLIENT_ID:}
lostfound.claims.mail.oauth.tenant-id=${LOSTFOUND_CLAIMS_MAIL_OAUTH_TENANT_ID:}
lostfound.claims.mail.oauth.client-secret=${LOSTFOUND_CLAIMS_MAIL_OAUTH_CLIENT_SECRET:}

auth.session.cookie-secure=${AUTH_SESSION_COOKIE_SECURE:true}
auth.session.cookie-same-site=${AUTH_SESSION_COOKIE_SAME_SITE:None}

auth.customer-otp.ttl-minutes=${AUTH_CUSTOMER_OTP_TTL_MINUTES:5}
auth.customer-otp.max-attempts=${AUTH_CUSTOMER_OTP_MAX_ATTEMPTS:3}
auth.customer-otp.session-ttl-minutes=${AUTH_CUSTOMER_OTP_SESSION_TTL_MINUTES:60}
auth.customer-otp.device-cookie-name=${AUTH_CUSTOMER_OTP_DEVICE_COOKIE_NAME:LF_OTP_DEVICE}
auth.customer-otp.rate-limit-window-minutes=${AUTH_CUSTOMER_OTP_RATE_LIMIT_WINDOW_MINUTES:60}
auth.customer-otp.max-requests-per-window=${AUTH_CUSTOMER_OTP_MAX_REQUESTS_PER_WINDOW:5}
auth.customer-otp.cleanup-ms=${AUTH_CUSTOMER_OTP_CLEANUP_MS:300000}
auth.customer-otp.subject=${AUTH_CUSTOMER_OTP_SUBJECT:Your lost-and-found sign-in code}