server.port=8080


spring.datasource.url=jdbc:postgresql://localhost:5433/lf_clean
spring.datasource.username=lf_user
spring.datasource.password=lf_pass


spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC


spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration


# expose health endpoint
management.endpoints.web.exposure.include=health,info


# S3 / MinIO
s3.endpoint=http://localhost:9000
s3.accessKey=minioadmin
s3.secretKey=minioadmin
s3.bucket=lf-photos
s3.region=us-east-1


# multipart limits (adjust as needed)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# default was: 10 requests / 600 seconds
rateLimit.idMatch.maxRequests=10
rateLimit.idMatch.windowSeconds=600

# Claim email notifications
# Configure Microsoft Graph OAuth values with environment variables clientId, tenantId and clientSecret.
# If those values are not present, the service falls back to spring.mail.* SMTP settings.
lostfound.claims.mail.enabled=true
lostfound.claims.mail.from=noreply@suedtirolmobil.info
lostfound.claims.mail.oauth.client-id=${clientId:}
lostfound.claims.mail.oauth.tenant-id=${tenantId:}
lostfound.claims.mail.oauth.client-secret=${clientSecret:}
# Authentication/session defaults for local and LAN HTTP development.
# Set AUTH_SESSION_COOKIE_SECURE=true when serving the API only over HTTPS.
auth.session.cookie-secure=${AUTH_SESSION_COOKIE_SECURE:false}
auth.session.cookie-same-site=${AUTH_SESSION_COOKIE_SAME_SITE:Lax}

# Customer passwordless OTP authentication
auth.customer-otp.ttl-minutes=5
auth.customer-otp.max-attempts=3
auth.customer-otp.session-ttl-minutes=60
auth.customer-otp.device-cookie-name=LF_OTP_DEVICE
auth.customer-otp.rate-limit-window-minutes=60
auth.customer-otp.max-requests-per-window=5
auth.customer-otp.cleanup-ms=300000
auth.customer-otp.subject=Your lost-and-found sign-in code