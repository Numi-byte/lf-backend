server.port=8080


spring.datasource.url=jdbc:postgresql://localhost:5433/lf_clean
spring.datasource.username=lf_user
spring.datasource.password=lf_pass


spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC


spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration


# expose health endpoint
management.endpoints.web.exposure.include=health,info


# S3 / MinIO
s3.endpoint=http://localhost:9000
s3.accessKey=minioadmin
s3.secretKey=minioadmin
s3.bucket=lf-photos
s3.region=us-east-1


# multipart limits (adjust as needed)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# default was: 10 requests / 600 seconds
rateLimit.idMatch.maxRequests=10
rateLimit.idMatch.windowSeconds=600



